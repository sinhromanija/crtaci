<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SINHROMANIJA - Katalog</title>

<style>
:root {
    --primary:#051937;
    --standard:#2ecc71;
    --veci:#f1c40f;
    --accent:#007bff;
}

body {
    font-family: Arial;
    margin:0;
    background:#f0f2f5;
    text-align:center;
}

.header {
    position:sticky;
    top:0;
    background:var(--primary);
    color:white;
    padding:15px;
    z-index:1000;
}

.counter-box { font-size:18px; margin-top:5px; }

.status-badge {
    padding:6px 15px;
    border-radius:20px;
    display:inline-block;
    font-weight:bold;
}

.bg-standard { background:var(--standard); }
.bg-veci { background:var(--veci); color:black; }

.search-box {
    margin:15px auto;
    width:90%;
    max-width:500px;
}

.search-box input {
    width:100%;
    padding:12px;
    font-size:16px;
    border-radius:8px;
    border:1px solid #ccc;
}

.container {
    max-width:1200px;
    margin:auto;
    padding:10px;
}

.grid {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
    gap:10px;
}

.card {
    background:white;
    border-radius:8px;
    cursor:pointer;
    overflow:hidden;
    border:3px solid transparent;
    height:250px;
}

.card.selected { border-color:var(--accent); }

.card img {
    width:100%;
    height:170px;
    object-fit:cover;
}

.card-title {
    font-size:12px;
    padding:5px;
}

.admin-panel {
    display:none;
    background:white;
    padding:15px;
    margin:20px auto;
    max-width:500px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input, button {
    padding:10px;
    margin:5px 0;
    width:100%;
}
</style>
</head>

<body>

<div class="header">
    <h2>SINHROMANIJA</h2>
    <div>Izabrano: <span id="currentCount">0</span> / 50</div>
    <div id="statusBadge" class="status-badge bg-standard">STANDARD 1800 din</div>
</div>

<div class="search-box">
    <input type="text" id="search" placeholder="Pretraži crtaće...">
</div>

<button onclick="toggleAdmin()">ADMIN PANEL</button>

<div class="admin-panel" id="adminPanel">
    <h3>Admin - dodaj crtać</h3>
    <input id="newTitle" placeholder="Naziv crtaća">
    <button onclick="addMovie()">Dodaj</button>
</div>

<div class="container">
    <div class="grid" id="grid"></div>
</div>

<script>

/* ===== TVOJ KOMPLETAN SPISAK ===== */
let spisak = [
"10. Života (2024)",

"Angry Birds 2 (2019)",
"Arthur i Minimoji 1 (2006)",
"Arthur i Minimoji 2 (2009)",
"Arthur i Minimoji 3 (2010)",
"Asterix 1 Gal (1967)",
"Asterix 2 and Cleopatra (1968)",
"Asterix 3 The Twelve Tasks of Asterix (1976)",
"Asterix 4 vs Caesar (1985)",
"Asterix 5 in Britain (1986)",
"Asterix 6 and the Big Fight (1989)",
"Asterix 7 in America (1994)",
"Asterix 8 and the Vikings (2006)",
"Asterix 9 The Mansions of the Gods (2014)",
"Asterix 10 The Secret Of The Magic Potion (2018)",
"Astro Boy (2009)",
"Balto 1 (1995)",
"Balto 2 Wolf Quest (2002)",
"Balto 3 Wings of Change (2004)",
"Beauty and the Beast (2017)",
"Bigfoot 1 (2017)",
"Cloudy With A Chance Of Meatballs 1 (2009)",
"Cloudy With A Chance Of Meatballs 2 (2013)",
"DC League of Super-Pets (2022)",
"Despicable Me 1 (2010)",
"Despicable Me 2 (2013)",
"Despicable Me 3 (2017)",
"Despicable Me 4 (2024)",
"Dog Man (2025)",
"Dragon Hunters (2008)",
"Epic (2013)",
"Ferdinand (2017)",
"Frozen (2013)",
"Frozen 2 (2019)",
"Garfield 1 (2004)",
"Garfield 2 (2006)",
"Garfield Film (2024)",
"Grinč (2018)",
"Happy Feet (2006)",
"Hotel Transylvania 1 (2012)",
"Hotel Transylvania 2 (2015)",
"Hotel Transylvania 3 (2018)",
"Hotel Transylvania 4 (2022)",
"How To Train Your Dragon 1 (2010)",
"How To Train Your Dragon 2 (2014)",
"How To Train Your Dragon 3 (2019)",
"Ice Age 2 (2006)",
"Ice Age 3 (2009)",
"Ice Age 4 (2012)",
"Ice Age 5 (2016)",
"Inside Out 2 (2024)",
"Kung Fu Panda 1 (2008)",
"Kung Fu Panda 2 (2011)",
"Kung Fu Panda 3 (2016)",
"Kung Fu Panda 4 (2024)",
"Lilo and Stitch (2025)",
"Madagascar 1 (2005)",
"Madagascar 2 (2008)",
"Madagascar 3 (2012)",
"Minions 1 (2015)",
"Minions 2 (2022)",
"Moana 2 (2024)",
"Mulan 2 (2004)",
"My Little Pony (2021)",
"Niko 1 (2008)",
"Niko 2 (2012)",
"Niko 3 (2024)",
"PAW Patrol 1 (2021)",
"PAW Patrol 2 (2023)",
"Peter Pan (2003)",
"Pinokio (2021)",
"Puss in Boots 1 (2011)",
"Puss in Boots 2 (2022)",
"Rango (2011)",
"Rio 1 (2011)",
"Rio 2 (2014)",
"Shrek 1 (2001)",
"Shrek 2 (2004)",
"Shrek 3 (2007)",
"Shrek 4 (2010)",
"Sing 1 (2016)",
"Sing 2 (2021)",
"Sonic 1 (2020)",
"Sonic 2 (2022)",
"Sonic 3 (2024)",
"Space Jam 1 (1996)",
"Space Jam 2 (2021)",
"Spider-Verse (2023)",
"Stuart Little 1 (1999)",
"Stuart Little 2 (2002)",
"Super Mario Movie (2023)",
"The Bad Guys (2022)",
"The Croods 1 (2013)",
"The Croods 2 (2020)",
"The Lion King (2019)",
"The Little Mermaid (2023)",
"The Wild Robot (2024)",
"Trolls 1 (2016)",
"Trolls 2 (2020)",
"Trolls 3 (2023)",
"Wreck It Ralph 1 (2012)",
"Wreck It Ralph 2 (2018)",
"Zootopia (2016)",
"Zootopia 2 (2025)"
];

let selected = [];

const grid = document.getElementById("grid");
const search = document.getElementById("search");

function render(list = spisak) {
    grid.innerHTML = "";

    list.forEach(m => {
        const div = document.createElement("div");
        div.className = "card";

        if(selected.includes(m)) div.classList.add("selected");

        div.innerHTML = `
            <img src="https://via.placeholder.com/300x200?text=${encodeURIComponent(m)}">
            <div class="card-title">${m}</div>
        `;

        div.onclick = () => {
            if(selected.includes(m)) {
                selected = selected.filter(x => x !== m);
            } else if(selected.length < 50) {
                selected.push(m);
            }
            update();
            render(filter());
        };

        grid.appendChild(div);
    });
}

function filter() {
    return spisak.filter(m =>
        m.toLowerCase().includes(search.value.toLowerCase())
    );
}

search.addEventListener("input", () => render(filter()));

function update() {
    document.getElementById("currentCount").innerText = selected.length;

    const badge = document.getElementById("statusBadge");

    if(selected.length > 30) {
        badge.innerText = "VEĆI PAKET 2300 din";
        badge.className = "status-badge bg-veci";
    } else {
        badge.innerText = "STANDARD 1800 din";
        badge.className = "status-badge bg-standard";
    }
}

function toggleAdmin() {
    const p = document.getElementById("adminPanel");
    p.style.display = p.style.display === "block" ? "none" : "block";
}

function addMovie() {
    const val = document.getElementById("newTitle").value.trim();
    if(!val) return;

    spisak.push(val);
    document.getElementById("newTitle").value = "";

    render(filter());
}

update();
render();

</script>

</body>
</html>
